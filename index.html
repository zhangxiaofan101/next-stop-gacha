<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="选择困难症的中国旅行扭蛋机：249 个目的地 + 37 条联程线路，筛选比对、条件随机、串行程出路书">
<title>下一站 · 去哪玩</title>
<style>
  :root {
    --sky: #eaf4fe;
    --sky-deep: #d8ecfd;
    --paper: #ffffff;
    --ink: #333649;
    --ink-soft: #6b7086;
    --blue: #58b7f0;
    --blue-deep: #2e93d4;
    --orange: #ff9c3f;
    --orange-deep: #f07f1a;
    --green: #7bc86c;
    --pink: #f79ec4;
    --yellow: #ffd95c;
    --purple: #b39deb;
    --red: #ef6461;
    --spring: #7bc86c;
    --summer: #58b7f0;
    --autumn: #ff9c3f;
    --winter: #9dbbef;
    --round: "Yuanti SC", "STYuanti-SC", "YouYuan", "Microsoft YaHei", "PingFang SC", sans-serif;
    --sans: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", -apple-system, sans-serif;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: linear-gradient(#cfe8fd 0%, var(--sky) 30%, #f3f9ff 100%);
    color: var(--ink); font-family: var(--sans); font-size: 15px; line-height: 1.65;
    -webkit-font-smoothing: antialiased;
  }

  /* ---- 卡通天空背景 ---- */
  .sky { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
  .sun {
    position: absolute; top: -60px; right: -60px; width: 220px; height: 220px; border-radius: 50%;
    background: radial-gradient(circle, #ffe27a 30%, #ffd95c 60%, rgba(255, 217, 92, 0) 72%);
    animation: sunspin 40s linear infinite;
  }
  @keyframes sunspin { to { transform: rotate(360deg); } }
  .cloud {
    position: absolute; background: #fff; border-radius: 999px; opacity: .9;
    box-shadow: 30px 12px 0 -6px #fff, -28px 14px 0 -8px #fff, 0 0 0 2.5px rgba(51, 54, 73, 0.08);
    animation: drift linear infinite;
  }
  .c1 { width: 110px; height: 38px; top: 9%; left: -140px; animation-duration: 85s; }
  .c2 { width: 80px; height: 30px; top: 22%; left: -100px; animation-duration: 120s; animation-delay: -40s; }
  .c3 { width: 140px; height: 44px; top: 5%; left: -180px; animation-duration: 100s; animation-delay: -70s; }
  @keyframes drift { to { transform: translateX(calc(100vw + 360px)); } }
  .hills {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 0; pointer-events: none; height: 90px;
    background:
      radial-gradient(140px 90px at 12% 100%, #a9dc9c 98%, transparent),
      radial-gradient(220px 120px at 38% 100%, #8fd282 98%, transparent),
      radial-gradient(180px 100px at 68% 100%, #a9dc9c 98%, transparent),
      radial-gradient(240px 130px at 94% 100%, #8fd282 98%, transparent);
    opacity: .5;
  }

  .wrap { position: relative; z-index: 1; max-width: 1280px; margin: 0 auto; padding: 0 20px 170px; }

  /* ---- 头部 ---- */
  header { padding: 40px 0 6px; }
  .title-row { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  h1.logo {
    margin: 0; font-family: var(--round); font-size: 46px; letter-spacing: 4px; color: var(--ink);
    text-shadow: 3px 3px 0 var(--yellow);
  }
  .logo .plane { display: inline-block; animation: bob 3s ease-in-out infinite; }
  @keyframes bob { 50% { transform: translateY(-6px) rotate(6deg); } }
  .count-pill {
    font-family: var(--round); font-size: 14px; background: var(--paper); border: 2.5px solid var(--ink);
    border-radius: 999px; padding: 5px 16px; box-shadow: 3px 3px 0 rgba(51, 54, 73, .18);
    font-variant-numeric: tabular-nums;
  }
  .subtitle { margin: 8px 0 0; color: var(--ink-soft); font-size: 15px; }
  .subtitle b { color: var(--blue-deep); font-weight: 600; }

  /* ---- 筛选面板 ---- */
  .console {
    margin-top: 18px; background: var(--paper); border: 2.5px solid var(--ink); border-radius: 22px;
    padding: 18px 20px 14px; box-shadow: 6px 7px 0 rgba(88, 183, 240, .35);
    display: flex; flex-direction: column; gap: 11px;
  }
  .fgroup { display: flex; gap: 12px; align-items: baseline; }
  .flabel {
    flex: 0 0 46px; font-family: var(--round); font-size: 13px; color: var(--ink-soft); padding-top: 4px;
  }
  .chips { display: flex; flex-wrap: wrap; gap: 7px; }
  .chip {
    font-family: var(--sans); font-size: 13px; color: var(--ink); background: #fff;
    border: 2px solid var(--ink); border-radius: 999px; padding: 3px 13px; cursor: pointer; user-select: none;
    box-shadow: 2px 2px 0 rgba(51, 54, 73, .22); transition: transform .1s, box-shadow .1s, background .12s;
  }
  .chip:hover { background: #fff6da; }
  .chip:active { transform: translate(2px, 2px); box-shadow: 0 0 0 rgba(0, 0, 0, 0); }
  .chip.on { background: var(--blue); color: #fff; border-color: var(--ink); box-shadow: 2px 2px 0 rgba(46, 147, 212, .5); }
  .chip i { font-style: normal; font-size: .78em; opacity: .5; margin-left: 3px; }
  .chip.zero { opacity: .35; }
  #relaxBox { display: flex; flex-direction: column; gap: 8px; align-items: center; margin: 12px 0; }
  #gRelaxBtn { display: block; margin: 10px auto 0; }
  .chip:focus-visible, button:focus-visible, input:focus-visible, select:focus-visible {
    outline: 3px solid var(--orange); outline-offset: 2px;
  }
  .console-foot { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; border-top: 2px dashed #d7e6f5; padding-top: 12px; }
  .search {
    flex: 1 1 230px; min-width: 180px; background: #f3f9ff; border: 2px solid var(--ink); border-radius: 12px;
    color: var(--ink); font-family: var(--sans); font-size: 14px; padding: 8px 13px;
  }
  .search::placeholder { color: #9aa7bd; }
  .sort {
    background: #fff; border: 2px solid var(--ink); border-radius: 12px; color: var(--ink);
    font-family: var(--sans); font-size: 13px; padding: 8px 10px; cursor: pointer;
  }
  .btn {
    font-family: var(--round); font-size: 13px; color: var(--ink); background: #fff;
    border: 2px solid var(--ink); border-radius: 12px; padding: 7px 14px; cursor: pointer;
    box-shadow: 2px 2px 0 rgba(51, 54, 73, .22); transition: transform .1s, box-shadow .1s;
  }
  .btn:active { transform: translate(2px, 2px); box-shadow: none; }
  .btn.on { background: var(--pink); color: #fff; }
  .hit { margin-left: auto; font-family: var(--round); font-size: 14px; color: var(--blue-deep); font-variant-numeric: tabular-nums; }

  /* ---- 卡片 ---- */
  .grid { margin-top: 22px; display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
  .card {
    position: relative; background: var(--paper); border: 2.5px solid var(--ink); border-radius: 20px;
    overflow: hidden; cursor: pointer; box-shadow: 6px 7px 0 var(--rc, rgba(51, 54, 73, .18));
    transition: transform .15s ease, box-shadow .15s ease; animation: pop .35s ease backwards;
  }
  .card:hover { transform: translateY(-5px) rotate(-.4deg); box-shadow: 8px 11px 0 var(--rc, rgba(51, 54, 73, .25)); }
  @keyframes pop { from { opacity: 0; transform: scale(.94) translateY(10px); } }
  .c-strip {
    background: var(--rs, #cde9ff); padding: 7px 14px; border-bottom: 2.5px solid var(--ink);
    display: flex; justify-content: space-between; align-items: center; gap: 8px;
  }
  .c-route { font-family: var(--round); font-size: 12px; color: var(--ink); opacity: .85; letter-spacing: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .c-badges { display: flex; gap: 5px; flex: 0 0 auto; }
  .badge {
    font-size: 11px; border-radius: 999px; padding: 1px 9px; font-weight: 600;
    border: 2px solid var(--ink); background: #fff;
  }
  .badge.hot { background: var(--red); color: #fff; }
  .badge.mid { background: #fff; color: var(--ink-soft); }
  .badge.hid { background: var(--green); color: #fff; }
  .badge.now { background: var(--yellow); color: var(--ink); }
  .badge.altb { background: #e9e2f9; color: #5c4a8f; }
  .badge.routeb { background: var(--orange); color: #fff; }
  .badge.visitedb { background: #dcf3dd; color: #2e7d43; }
  .card.route-card { border-style: dashed; border-color: var(--orange-deep); }
  .c-body { padding: 12px 16px 14px; }
  .c-name-row { display: flex; align-items: center; gap: 10px; }
  .c-emoji {
    flex: 0 0 auto; width: 46px; height: 46px; border-radius: 16px; background: var(--rs, #cde9ff);
    border: 2.5px solid var(--ink); display: grid; place-items: center; font-size: 24px;
    transform: rotate(-4deg);
  }
  .c-name { font-family: var(--round); font-size: 23px; color: var(--ink); line-height: 1.2; }
  .c-prov { font-size: 12px; color: var(--ink-soft); }
  .c-tagline { margin: 8px 0; font-size: 13px; color: #4a5169; }
  .c-meta { display: flex; flex-wrap: wrap; gap: 5px 13px; align-items: center; font-size: 12px; color: var(--ink-soft); }
  .seasons { display: inline-flex; gap: 3px; }
  .s-dot {
    width: 20px; height: 20px; border-radius: 50%; display: grid; place-items: center;
    font-size: 11px; color: #fff; background: #dfe7f2; border: 1.5px solid rgba(51,54,73,.25);
  }
  .s-dot.off { opacity: .35; color: #98a4b8; background: #eef2f8; }
  .s-dot.s春 { background: var(--spring); }
  .s-dot.s夏 { background: var(--summer); }
  .s-dot.s秋 { background: var(--autumn); }
  .s-dot.s冬 { background: var(--winter); }
  .s-dot.off.s春, .s-dot.off.s夏, .s-dot.off.s秋, .s-dot.off.s冬 { background: #eef2f8; }
  .c-tags { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 5px; }
  .mini-tag { font-size: 11px; color: #3f6e8c; background: #e3f2fe; border-radius: 999px; padding: 1px 9px; }
  .c-actions { display: flex; gap: 7px; margin-top: 11px; }
  .act {
    font-size: 12px; font-family: var(--round); border: 2px solid var(--ink); border-radius: 999px;
    background: #fff; color: var(--ink); padding: 3px 12px; cursor: pointer;
    box-shadow: 2px 2px 0 rgba(51, 54, 73, .18); transition: transform .1s, box-shadow .1s;
  }
  .act:active { transform: translate(2px, 2px); box-shadow: none; }
  .act.fav.on { background: var(--pink); color: #fff; }
  .act.cmp.on { background: var(--purple); color: #fff; }
  .act.trip.on { background: var(--orange); color: #fff; }

  .empty { display: none; text-align: center; padding: 70px 20px; color: var(--ink-soft); }
  .empty .big { font-size: 46px; }

  /* ---- 底部悬浮 dock & 扭蛋按钮 ---- */
  .fab {
    position: fixed; right: 24px; bottom: 24px; z-index: 40;
    font-family: var(--round); font-size: 17px; color: var(--ink);
    background: linear-gradient(180deg, #ffd95c, var(--orange));
    border: 3px solid var(--ink); border-radius: 999px; padding: 14px 24px; cursor: pointer;
    box-shadow: 4px 5px 0 rgba(51, 54, 73, .35); animation: wiggle 4s ease-in-out infinite;
  }
  .fab:hover { animation-play-state: paused; transform: scale(1.05); }
  .fab:active { transform: translate(2px, 2px); box-shadow: none; }
  @keyframes wiggle { 0%, 88%, 100% { transform: rotate(0); } 92% { transform: rotate(-3deg); } 96% { transform: rotate(3deg); } }

  .dock {
    position: fixed; left: 50%; transform: translateX(-50%); bottom: 22px; z-index: 40;
    display: none; gap: 14px; align-items: stretch; flex-wrap: wrap; justify-content: center;
    max-width: min(860px, calc(100vw - 190px));
  }
  .dock.show { display: flex; }
  .dock-box {
    display: flex; gap: 8px; align-items: center; background: #fff6de;
    border: 2.5px solid var(--ink); border-radius: 16px; padding: 8px 12px;
    box-shadow: 4px 5px 0 rgba(51, 54, 73, .25);
  }
  .dock-label { font-family: var(--round); font-size: 13px; color: var(--ink-soft); white-space: nowrap; }
  .dock-items { display: flex; gap: 5px; flex-wrap: wrap; max-width: 320px; }
  .dock-chip {
    font-size: 12px; font-family: inherit; color: inherit; background: #f3f9ff; border: 1.5px solid var(--ink); border-radius: 999px;
    padding: 1px 9px; cursor: pointer; white-space: nowrap;
  }
  .dock-chip:hover { background: #ffe3e2; text-decoration: line-through; }
  .dock-go {
    font-family: var(--round); font-size: 13px; color: #fff; border: 2px solid var(--ink); border-radius: 12px;
    padding: 6px 13px; cursor: pointer; white-space: nowrap; box-shadow: 2px 2px 0 rgba(51,54,73,.25);
  }
  .dock-go:active { transform: translate(2px, 2px); box-shadow: none; }
  .dock-go.cmp { background: var(--purple); }
  .dock-go.trip { background: var(--orange); }
  .dock-x {
    flex: 0 0 auto; width: 22px; height: 22px; border-radius: 50%;
    border: 1.5px solid var(--ink); background: #fff; color: var(--ink-soft);
    font-size: 11px; line-height: 1; cursor: pointer;
  }
  .dock-x:hover { background: var(--red); color: #fff; }

  /* ---- 弹层 ---- */
  .overlay {
    position: fixed; inset: 0; z-index: 50; display: none;
    background: rgba(120, 160, 205, .38); backdrop-filter: blur(5px);
    overflow-y: auto; padding: 4vh 16px 60px;
  }
  .overlay.show { display: block; }
  #detailOverlay { z-index: 55; } /* 详情可从扭蛋结果打开，须压在扭蛋层（50）之上 */
  .sheet { max-width: 760px; margin: 0 auto; position: relative; animation: pop .28s ease; }
  .sheet-close {
    position: absolute; top: -14px; right: -8px; z-index: 2;
    background: var(--red); color: #fff; border: 2.5px solid var(--ink);
    border-radius: 50%; width: 40px; height: 40px; font-size: 17px; cursor: pointer;
    box-shadow: 3px 3px 0 rgba(51, 54, 73, .3);
  }
  .paper {
    background: var(--paper); border: 2.5px solid var(--ink); border-radius: 24px;
    padding: 28px 30px; box-shadow: 8px 10px 0 rgba(88, 183, 240, .35);
  }

  /* 详情 */
  .dt-head { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
  .dt-emoji { width: 64px; height: 64px; font-size: 32px; border-radius: 20px; flex: 0 0 auto; }
  .dt-name { font-family: var(--round); font-size: 34px; margin: 0; line-height: 1.15; }
  .dt-sub { font-size: 13px; color: var(--ink-soft); margin-top: 3px; }
  .dt-tagline { font-size: 15px; color: #4a5169; margin: 12px 0 4px; }
  .dt-meta { display: flex; flex-wrap: wrap; gap: 7px 18px; font-size: 13px; color: var(--ink-soft); margin: 8px 0; align-items: center; }
  .dt-sec { margin-top: 15px; }
  .dt-sec h3 { font-family: var(--round); font-size: 15px; margin: 0 0 7px; color: var(--ink); }
  .dt-chips { display: flex; flex-wrap: wrap; gap: 7px; }
  .dt-chip { font-size: 13px; background: #eef6ff; border: 1.5px solid #bcd8f0; border-radius: 999px; padding: 3px 12px; color: #33608a; }
  .dt-chip.food { background: #fff0e3; border-color: #f5cba0; color: #a05a1c; }
  .dt-list { margin: 0; padding-left: 20px; font-size: 14px; color: #414965; }
  .dt-list li { margin: 3px 0; }
  .note-box {
    font-size: 13px; background: #f4fbf0; border: 2px dashed #a8d89c; border-radius: 14px;
    padding: 9px 14px; color: #3d6b34;
  }
  .note-box.hotel { background: #fef7ec; border-color: #f0cf96; color: #7d5b1e; }
  .plan {
    background: #f6faff; border: 2px solid #cfe3f5; border-radius: 14px;
    padding: 10px 14px; margin-top: 8px; display: flex; gap: 12px; align-items: baseline;
  }
  .plan-days {
    flex: 0 0 auto; font-family: var(--round); font-size: 13px; color: #fff;
    background: var(--blue); border: 2px solid var(--ink); border-radius: 999px; padding: 1px 10px;
  }
  .plan-title { font-weight: 600; font-size: 14px; }
  .plan-route { font-size: 13px; color: #55627f; margin-top: 2px; }
  .dt-actrow { display: flex; gap: 10px; margin-top: 18px; flex-wrap: wrap; }
  .wx-row { display: flex; flex-wrap: wrap; gap: 6px; }
  .wx-day {
    flex: 1 1 64px; min-width: 58px; text-align: center; font-size: 12px; line-height: 1.5;
    background: #fff; border: 1.5px solid var(--ink); border-radius: 12px; padding: 6px 4px;
  }
  .wx-day div:nth-child(2) { font-size: 15px; }
  .wx-note { font-size: 12px; color: var(--ink-soft); margin-top: 6px; }

  /* 扭蛋机 */
  .gacha-box { max-width: 560px; margin: 5vh auto 0; text-align: center; position: relative; }
  .machine {
    background: var(--paper); border: 3px solid var(--ink); border-radius: 26px;
    padding: 26px 24px; box-shadow: 8px 10px 0 rgba(255, 156, 63, .4);
  }
  .g-scope { font-size: 12px; color: var(--ink-soft); margin-bottom: 14px; }
  .g-scope b { color: var(--orange-deep); }
  .g-window {
    background: linear-gradient(#fef9ee, #fff); border: 3px solid var(--ink); border-radius: 18px;
    padding: 30px 14px; position: relative; overflow: hidden;
  }
  .g-city { font-family: var(--round); font-size: clamp(34px, 8vw, 52px); letter-spacing: 4px; line-height: 1.2; min-height: 1.2em; }
  .g-city.spin { animation: gspin .1s linear infinite; }
  @keyframes gspin { 0% { opacity: .4; transform: translateY(-4px); } 100% { opacity: 1; transform: translateY(3px); } }
  .g-sub { font-size: 13px; color: var(--ink-soft); margin-top: 8px; min-height: 1.4em; }
  .g-knob {
    margin: 20px auto 0; width: 74px; height: 74px; border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #ffd95c, var(--orange));
    border: 3px solid var(--ink); cursor: pointer; font-size: 26px;
    box-shadow: 3px 4px 0 rgba(51, 54, 73, .35); transition: transform .5s ease;
  }
  .g-knob.turn { transform: rotate(200deg); }
  .g-knob:disabled { opacity: .6; cursor: wait; }
  .g-actions { display: flex; gap: 10px; justify-content: center; margin-top: 16px; flex-wrap: wrap; }
  #gachaTicket { margin-top: 20px; text-align: left; display: none; animation: pop .4s cubic-bezier(.2, .9, .3, 1.3) backwards; }
  #gachaTicket.show { display: block; }

  /* 对比表 */
  .cmp-sheet { max-width: 1120px; margin: 0 auto; position: relative; }
  .cmp-scroll { overflow-x: auto; border: 2.5px solid var(--ink); border-radius: 20px; background: #fff; box-shadow: 8px 10px 0 rgba(179, 157, 235, .4); }
  table.cmp { border-collapse: collapse; width: 100%; min-width: 660px; font-size: 13px; }
  table.cmp th, table.cmp td { border: 1.5px solid #d8e2ef; padding: 10px 14px; text-align: left; vertical-align: top; }
  table.cmp th.rowh { font-family: var(--round); font-size: 12px; color: var(--ink-soft); background: #f2f8ff; white-space: nowrap; width: 92px; }
  table.cmp td.cityh { font-family: var(--round); font-size: 20px; background: #fef8e8; }
  table.cmp td .sm { font-size: 11px; color: var(--ink-soft); font-weight: 400; }

  /* 行程规划 */
  .stop {
    display: flex; align-items: center; gap: 10px; background: #f6faff;
    border: 2px solid #cfe3f5; border-radius: 16px; padding: 9px 12px; margin-top: 8px;
  }
  .stop-idx {
    flex: 0 0 auto; width: 26px; height: 26px; border-radius: 50%; background: var(--orange);
    border: 2px solid var(--ink); color: #fff; font-family: var(--round); font-size: 13px;
    display: grid; place-items: center;
  }
  .stop-name { font-family: var(--round); font-size: 16px; flex: 1 1 auto; min-width: 0; }
  .stop-name .sm { font-size: 11px; color: var(--ink-soft); font-family: var(--sans); }
  .stop select {
    border: 2px solid var(--ink); border-radius: 10px; padding: 3px 6px; font-size: 13px; background: #fff; cursor: pointer;
  }
  .stop .mini {
    width: 28px; height: 28px; border: 2px solid var(--ink); border-radius: 9px; background: #fff;
    cursor: pointer; font-size: 13px; box-shadow: 1.5px 1.5px 0 rgba(51,54,73,.2);
  }
  .stop .mini:active { transform: translate(1px, 1px); box-shadow: none; }
  .leg-line { display: flex; align-items: center; gap: 8px; margin: 2px 0 2px 12px; font-size: 12px; color: var(--ink-soft); }
  .leg-line .dash { flex: 0 0 26px; border-top: 2px dashed #b9cfe4; }
  .trip-stats {
    display: flex; flex-wrap: wrap; gap: 8px 22px; margin-top: 16px; font-size: 13.5px;
    background: #fff8e6; border: 2px dashed #ecc94b; border-radius: 14px; padding: 10px 16px;
  }
  .trip-stats b { font-family: var(--round); color: var(--orange-deep); }
  .sugg { margin-top: 14px; font-size: 13px; color: var(--ink-soft); }
  .sugg .chips { display: inline-flex; margin-left: 6px; }
  .big-btn {
    font-family: var(--round); font-size: 16px; color: #fff; background: linear-gradient(180deg, #ffb35c, var(--orange));
    border: 2.5px solid var(--ink); border-radius: 16px; padding: 11px 26px; cursor: pointer;
    box-shadow: 4px 5px 0 rgba(51, 54, 73, .3);
  }
  .big-btn:active { transform: translate(2px, 2px); box-shadow: none; }
  .big-btn.blue { background: linear-gradient(180deg, #8cd0f7, var(--blue)); }
  .big-btn.ghost { background: #fff; color: var(--ink); }

  /* 路书 */

const WX_LS_KEY = "nextstop_wx_v1";
const WX_TTL = 3 * 60 * 60 * 1000; // 缓存 3 小时内直接复用，减少请求
function wxCacheRead() {
  try { return JSON.parse(localStorage.getItem(WX_LS_KEY) || "{}"); } catch (e) { return {}; }
}
function wxCacheWrite(cache) {
  try {
    const keys = Object.keys(cache);
    if (keys.length > 60) keys.sort((a, b) => cache[a].t - cache[b].t).slice(0, keys.length - 60).forEach(k => delete cache[k]);
    localStorage.setItem(WX_LS_KEY, JSON.stringify(cache));
  } catch (e) {}
}
// 同步读缓存（仅 TTL 内命中才返回），供路书文本导出等不发请求的场景用
function wxCacheGet(id) {
  const hit = wxCacheRead()[id];
  return (hit && Date.now() - hit.t < WX_TTL) ? hit.days : null;
}
// 拉 7 天预报；任何失败（超时/断网/非200/解析错）都只 console.warn 后返回 null，绝不抛错影响页面其他功能
async function fetchWeather(d) {
  const cached = wxCacheGet(d.id);
  if (cached) return cached;
  const coords = (d.stops && d.stops.length ? byId(d.stops[0].id)?.coords : d.coords) || null; // 线路卡取首站坐标，代表起点站
  if (!coords) return null;
  const [lat, lng] = coords;
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), 6000);
  try {
    const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&daily=weather_code,temperature_2m_max,temperature_2m_min&timezone=Asia%2FShanghai&forecast_days=7`, { signal: ctrl.signal });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const j = await res.json();
    const days = j.daily.time.map((dt, i) => ({
      dt, code: j.daily.weather_code[i],
      hi: Math.round(j.daily.temperature_2m_max[i]), lo: Math.round(j.daily.temperature_2m_min[i]),
    }));
    const cache = wxCacheRead();
    cache[d.id] = { t: Date.now(), days };
    wxCacheWrite(cache);
    return days;
  } catch (e) {
    console.warn("天气预报获取失败：", e);
    return null;
  } finally {
    clearTimeout(timer);
  }
}

function hav(a, b) {
  const R = 6371, r = x => x * Math.PI / 180;
  const dLat = r(b[0] - a[0]), dLng = r(b[1] - a[1]);
  const h = Math.sin(dLat / 2) ** 2 + Math.cos(r(a[0])) * Math.cos(r(b[0])) * Math.sin(dLng / 2) ** 2;
  return Math.round(2 * R * Math.asin(Math.sqrt(h)));
}

//  · 大连：除东北三省（哈大/沈白直达）外，其余方向直线均跨渤海/黄海
//  · 胶东三市南向：纬度<34.5 且经度>118（江浙沪及以南沿海）跨黄海；西/西南内陆（徐州、郑洛、石家庄）走陆路
//  · 胶东三市北向：东北三省跨渤海海峡；烟台/威海位置近海角，北纬>38.8（京/承/大同一线）即跨渤海湾；
//    青岛偏南基部，西北扇面（北京/正定）有陆路直达，仅东北向（承德/坝上，纬>39.5 且经>117.4）跨湾
const SD_PEN = new Set(["qingdao", "yantai", "weihai"]);
const NE_PROV = new Set(["辽宁", "吉林", "黑龙江"]);
function seaDetour(p, q) {
  const [lat, lng] = q.coords;
  if (p.id === "dalian") return !NE_PROV.has(q.province);
  if (!SD_PEN.has(p.id)) return false;
  if (lat < 34.5 && lng > 118) return true;
  if (NE_PROV.has(q.province)) return true;
  if (p.id === "qingdao") return lat > 39.5 && lng > 117.4;
  return lat > 38.8;
}
// 时长参数以 245 条 transit 人写时长回归标定（2026-07-14）：高铁=直线km/190+0.6，
// 飞机=直线km/625+2.4（口径为门到门、含机场地面时间）；干线快/沿海支线慢的残差是直线模型固有的，输出恒标"估算"
function legInfo(a, b) {
  const km = hav(a.coords, b.coords);
  const straight = Math.round(km * 1.25); // 近似实际里程
  const provFly = FLY_PROV.has(a.province) || FLY_PROV.has(b.province);
  const needFly = provFly || (km >= 500 && (seaDetour(a, b) || seaDetour(b, a)));
  let mode, icon, hours;
  if (km < 60) { mode = "打车/自驾"; icon = "🚕"; hours = Math.max(.6, km / 50); }
  else if (km < 160 && !needFly) { mode = "高铁/自驾"; icon = "🚄"; hours = km / 160 + .4; }
  else if (km < 950 && !needFly) { mode = "高铁"; icon = "🚄"; hours = km / 190 + .6; }
  else if (provFly && km < 400) { mode = "包车/大巴"; icon = "🚐"; hours = km / 55; }
  else { mode = "飞机"; icon = "✈️"; hours = km / 625 + 2.4; }
  return { km: straight, mode, icon, hours: Math.round(hours * 10) / 10 };
}
const fmtH = h => h >= 1 ? `约${h}h` : `约${Math.round(h * 60)}分钟`;
// 玩法节奏小清单：路线型目的地（玩法主体=沿线移动、按晚换落脚点），路书住宿建议按段订房。
// 从严收录——单基地+一晚特色住宿（林芝/神农架/漠河）与双基地（乐山峨眉/晋东南）不算路线型。
const ROUTE_STAY = new Set(["duku-highway", "chuanxi-loop", "xining-qinghai-lake", "hulunbuir", "gannan", "yili", "siguniangshan-danba", "altay"]);
// 线路天数展示（F8）：days 枚举=有对应 plan 支撑的弹性档位，Σstops=默认装入分配；名称不带日数（build 强制）
function routeDaysText(d) {
  const sum = d.stops.reduce((s, x) => s + x.days, 0);
  const lo = Math.min(...d.days), hi = Math.max(...d.days);
  return lo === hi ? `约${lo}天` : `约${lo}~${hi}天 · 默认${sum}天`;
}

        const t = order.indexOf(v);

/* ================= 过滤 & 排序 ================= */
// 单条记录是否命中；okey/oset 可临时覆盖某一组条件（okey="q"/"onlyFav"/"noAlt" 时表示清掉该项），
// 供 chip 实时计数与空态定向放宽做"如果改这一个条件会怎样"的假设计算。
function matchOne(d, okey, oset) {
  const g = k => (k === okey ? oset : state[k]);
  const q = okey === "q" ? "" : state.q;
  const fav = okey === "onlyFav" ? false : state.onlyFav;
  const noAlt = okey === "noAlt" ? false : state.noAlt;
  const hideV = okey === "hideVisited" ? false : state.hideVisited;
  if (fav && !state.favs.includes(d.id)) return false;
  if (noAlt && d.alt) return false;
  if (hideV && state.visited.includes(d.id)) return false;
  if (g("region").size && !(d.regions || [d.region]).some(r => g("region").has(r))) return false;
  if (g("season").size && !d.seasons.some(s => g("season").has(s))) return false;
  if (g("days").size && !DAY_BUCKETS.some(b => g("days").has(b.key) && b.test(d.days))) return false;
  if (g("crowd").size && !g("crowd").has(d.crowd)) return false;
  if (g("cost").size && !g("cost").has(d.cost)) return false;
  if (g("difficulty").size && !g("difficulty").has(d.difficulty)) return false;
  // 体力：偏好型多选 OR；记录 effort 为空数组 = 怎么玩都行，任何选择都命中
  if (g("effort").size && d.effort.length && !d.effort.some(x => g("effort").has(x))) return false;
  // 同行：同上口径，空数组 = 谁来都合适
  if (g("companions").size && d.companions.length && !d.companions.some(x => g("companions").has(x))) return false;
  if (g("tags").size && ![...g("tags")].every(t => d.tags.includes(t))) return false;
  if (q) {
    const hay = [d.name, d.province, d.tagline, ...d.tags, ...d.food, ...d.highlights, ...d.architecture, ...d.museums].join(" ").toLowerCase();
    if (!hay.includes(q.toLowerCase())) return false;
  }
  return true;
}
const countWith = (okey, oset) => DATA.reduce((n, d) => n + matchOne(d, okey, oset), 0);

// 模拟点击某 chip 后该组的选中集（与真实点击逻辑一致：天花板组填充 {0..t}，其余 toggle）
function simulateClick(key, v) {
  const cur = state[key];
  const next = new Set(cur);
  const order = CEIL_GROUPS[key];
  if (order) {
    const t = order.indexOf(v);
    const curCeil = cur.size ? Math.max(...[...cur].map(x => order.indexOf(x))) : -1;
    next.clear();
    if (curCeil !== t) order.slice(0, t + 1).forEach(x => next.add(x));
  } else {
    next.has(v) ? next.delete(v) : next.add(v);
  }
  return next;
}

// 每个未选 chip 标注"点下去还剩几个"，0 置灰；已选 chip 不标（点它是取消）
function updateChipCounts() {
  document.querySelectorAll("#console .chips").forEach(box => {
    const key = box.dataset.key;
    box.querySelectorAll(".chip").forEach(btn => {
      const v = btn.dataset.v;
      const on = state[key].has(v);
      const n = on ? -1 : countWith(key, simulateClick(key, v));
      let i = btn.querySelector("i");
      if (!i) { i = document.createElement("i"); btn.appendChild(i); }
      i.textContent = on ? "" : String(n);
      btn.classList.toggle("zero", !on && n === 0);
    });
  });
}

function syncChips() {
  document.querySelectorAll("#console .chips").forEach(box => {
    const set = state[box.dataset.key];
    box.querySelectorAll(".chip").forEach(c => c.classList.toggle("on", set.has(c.dataset.v)));
  });
}

// 空池时的定向放宽候选：去掉单个玩法 tag / 放开整组 / 清搜索词 / 关只看收藏，按救回数降序
const GROUP_NAMES = { region: "地区", season: "季节", days: "天数", crowd: "冷热", cost: "花费", difficulty: "抵达难度", effort: "体力", companions: "同行" };
let relaxCands = [];
function relaxCandidates() {
  const cands = [];
  [...state.tags].forEach(t => {
    const s = new Set(state.tags); s.delete(t);
    cands.push({ label: `去掉「${t}」`, n: countWith("tags", s), apply: () => state.tags.delete(t) });
  });
  Object.keys(GROUP_NAMES).forEach(k => {
    if (state[k].size) cands.push({ label: `不限${GROUP_NAMES[k]}`, n: countWith(k, new Set()), apply: () => state[k].clear() });
  });
  if (state.q) cands.push({
    label: `清掉搜索「${state.q}」`, n: countWith("q", null),
    apply: () => { state.q = ""; document.getElementById("searchBox").value = ""; },
  });
  if (state.onlyFav) cands.push({
    label: "不只看收藏", n: countWith("onlyFav", null),
    apply: () => { state.onlyFav = false; document.getElementById("favToggle").classList.remove("on"); },
  });
  if (state.noAlt) cands.push({
    label: "不避开高海拔", n: countWith("noAlt", null),
    apply: () => { state.noAlt = false; document.getElementById("altToggle").classList.remove("on"); },
  });
  if (state.hideVisited) cands.push({
    label: "不隐藏去过的", n: countWith("hideVisited", null),
    apply: () => { state.hideVisited = false; document.getElementById("visitedToggle").classList.remove("on"); },
  });
  return cands.filter(c => c.n > 0).sort((a, b) => b.n - a.n);
}
function applyRelax(i) {
  const c = relaxCands[i];
  if (!c) return;
  c.apply(); syncChips(); render();
}

function filtered() {
  let list = DATA.filter(d => matchOne(d, null, null));
  const crowdRank = { "小众": 0, "适中": 1, "热门": 2 };
  if (state.sort === "hidden") list = [...list].sort((a, b) => crowdRank[a.crowd] - crowdRank[b.crowd]);
  if (state.sort === "hot") list = [...list].sort((a, b) => crowdRank[b.crowd] - crowdRank[a.crowd]);
  if (state.sort === "short") list = [...list].sort((a, b) => Math.min(...a.days) - Math.min(...b.days));
  if (state.sort === "season") list = [...list].sort((a, b) => b.seasons.includes(CUR_SEASON) - a.seasons.includes(CUR_SEASON));
  return list;
}

/* ================= 卡片渲染 ================= */
const seasonsHTML = d => `<span class="seasons">${SEASONS.map(s =>

      <div class="c-name-row">

function render() {
  const list = filtered();
  document.getElementById("grid").innerHTML = list.map(cardHTML).join("");

  document.getElementById("hitCount").textContent = `命中 ${list.length} / ${DATA.length}`;
  if (!list.length) {
    relaxCands = relaxCandidates();
    document.getElementById("relaxBox").innerHTML = relaxCands.slice(0, 3).map((c, i) =>
      `<button class="btn relax" data-relax="${i}">${c.label} → 能救回 ${c.n} 个</button>`).join("");
  }
  updateChipCounts();
  renderDock();
  updateFootprint();
}
// 足迹统计：打卡数 + 点亮省份数（只算城市记录，线路卡不计入 visited）
function updateFootprint() {
  const pill = document.getElementById("footPill");
  const n = state.visited.length;
  if (!n) { pill.style.display = "none"; return; }
  const provs = new Set(state.visited.map(id => byId(id)?.province).filter(Boolean));

/* ================= 收藏 / 对比 / 行程 篮子 ================= */
function toggleFav(id) {
  const i = state.favs.indexOf(id);
  i >= 0 ? state.favs.splice(i, 1) : state.favs.push(id);
  saveLS(); render();
}
function toggleVisited(id) {
  const i = state.visited.indexOf(id);
  if (i >= 0) { state.visited.splice(i, 1); toast("已取消打卡"); }
  else { state.visited.push(id); toast(`👣 已打卡：${byId(id).name}`); }
  saveLS(); render();
}
function toggleCmp(id) {
  const i = state.cmp.indexOf(id);
  if (i >= 0) state.cmp.splice(i, 1);
  else {
    if (state.cmp.length >= 4) { toast("最多对比 4 个哦"); return; }
    state.cmp.push(id);
  }
  saveLS(); render();
}
function toggleTrip(id) {
  const i = state.trip.findIndex(t => t.id === id);
  if (i >= 0) state.trip.splice(i, 1);
  else {
    if (state.trip.length >= 6) { toast("一次行程最多 6 站，贪多嚼不烂～"); return; }
    const d = byId(id);
    state.trip.push({ id, days: Math.min(...d.days) });
    toast(`已加入行程：${d.name}`);
  }
  saveLS(); render();
}
// M18 线路卡：把 stops 逐条展开装入行程单（复用既有路书管线，不改行程/路书任何逻辑）
function addRouteToTrip(routeId) {
  const route = byId(routeId); if (!route || !route.stops) return;
  let added = 0, skippedFull = false;
  for (const s of route.stops) {
    if (state.trip.some(t => t.id === s.id)) continue;
    if (state.trip.length >= 6) { skippedFull = true; break; }
    state.trip.push({ id: s.id, days: s.days });
    added++;
  }
  saveLS(); render();
  if (added === 0) toast(skippedFull ? "行程已满，一站都没装进去" : "这条线路的站点都已在行程里啦");
  else if (skippedFull) toast(`行程已满 6 站，只装入了前 ${added} 站`);
  else toast(`已把「${route.name}」整条装入行程（${added} 站）`);
}

/* ================= 详情 ================= */
function detailHTML(d) {
  const sec = (title, inner) => inner ? `<div class="dt-sec"><h3>${title}</h3>${inner}</div>` : "";
  const chips = (arr, cls = "") => arr.length ? `<div class="dt-chips">${arr.map(x => `<span class="dt-chip ${cls}">${x}</span>`).join("")}</div>` : "";
  const rs = REGION_COLOR[d.region] || "#cde9ff";
  const isRoute = !!d.stops;
  const inTrip = state.trip.some(t => t.id === d.id);
  const tripBtn = isRoute
    ? `<button class="big-btn" data-addroute="${d.id}">🎫 整条装入行程单</button>`

// 详情页 7 天预报：异步填充，用 data-id 核对——避免用户快速换卡片时把旧请求的结果写串
async function fillDetailWeather(d) {
  const box = document.getElementById("wxSec");
  if (!box) return;
  box.dataset.id = d.id;
  const days = await fetchWeather(d);
  if (!days || box.dataset.id !== d.id) return;
  const WEEK = ["周日", "周一", "周二", "周三", "周四", "周五", "周六"];
  const startOfDay = t => new Date(t.getFullYear(), t.getMonth(), t.getDate()).getTime();
  const todayTs = startOfDay(new Date());
  const cells = days.map(x => {
    const [y, m, dd] = x.dt.split("-").map(Number);
    const dt = new Date(y, m - 1, dd);
    const diff = Math.round((startOfDay(dt) - todayTs) / 86400000);
    const label = diff === 0 ? "今天" : diff === 1 ? "明天" : WEEK[dt.getDay()];
    const info = wxInfo(x.code);
    return `<div class="wx-day"><div>${label}</div><div>${info.e}</div><div>${x.hi}°/${x.lo}°</div></div>`;
  }).join("");
  box.innerHTML = `<div class="dt-sec"><h3>⛅ 未来 7 天${d.stops ? " · 起点站" : ""}</h3><div class="wx-row">${cells}</div><div class="wx-note">Open-Meteo 估算 · 出发前以天气 App 为准</div></div>`;
}

function roll() {
  if (rolling) return;
  const pool = filtered(); if (!pool.length) return;
  rolling = true;
  const cityEl = document.getElementById("gCity");
  const subEl = document.getElementById("gSub");
  const knob = document.getElementById("gKnob");
  const ticketEl = document.getElementById("gachaTicket");
  ticketEl.className = ""; ticketEl.innerHTML = "";
  document.getElementById("gDetailBtn").style.display = "none";
  document.getElementById("gTripBtn").style.display = "none";
  knob.disabled = true; knob.classList.add("turn");
  cityEl.classList.add("spin");

  const pick = pool[Math.floor(Math.random() * pool.length)];
  lastPick = pick;
  let t = 0;
  const totalMs = 2300;
  const step = (delay) => {
    const r = pool[Math.floor(Math.random() * pool.length)];
    cityEl.textContent = r.emoji + " " + r.name;
    subEl.textContent = r.province + " · " + r.region;
    t += delay;
    if (t < totalMs) setTimeout(() => step(Math.min(delay * 1.2, 300)), delay);
    else {
      cityEl.classList.remove("spin");
      cityEl.textContent = pick.emoji + " " + pick.name;
      subEl.textContent = `${pick.province} · ${pick.region} · ${pick.crowd}`;
      ticketEl.innerHTML = cardHTML(pick, 0);
      ticketEl.className = "show";
      document.getElementById("gDetailBtn").style.display = "";
      document.getElementById("gTripBtn").style.display = "";
      knob.disabled = false; knob.classList.remove("turn");
      rolling = false;
      confetti();
    }
  };
  step(60);
}

/* ================= 行程规划 ================= */
function tripStops() { return state.trip.map(t => ({ ...byId(t.id), chosenDays: t.days })); }

function autoOrder() {
  const rest = [...state.trip];
  const ordered = [];
  let cur = SH.coords;
  while (rest.length) {
    let bi = 0, bd = Infinity;
    rest.forEach((t, i) => {
      const km = hav(cur, byId(t.id).coords);
      if (km < bd) { bd = km; bi = i; }
    });
    const next = rest.splice(bi, 1)[0];
    ordered.push(next);
    cur = byId(next.id).coords;
  }
  state.trip = ordered;
  saveLS(); renderTrip(); render();
  toast("已按顺路顺序重排 🧭");
}

function tripLegs() {
  const stops = tripStops();
  const pts = [SH, ...stops, SH];
  const legs = [];
  for (let i = 0; i < pts.length - 1; i++) {
    const a = pts[i], b = pts[i + 1];
    legs.push({ from: a, to: b, ...legInfo(a.coords ? a : { ...a }, b) });
  }
  return legs;
}

function tripBudget() {
  const stops = tripStops();
  const daySum = stops.reduce((s, d) => s + d.chosenDays, 0);
  let stay = stops.reduce((s, d) => s + d.chosenDays * PER_DAY_COST[d.cost], 0);
  const legs = tripLegs();
  const trans = legs.reduce((s, l) => s + (l.mode === "飞机" ? 550 + l.km * 0.35 : l.km * 0.5), 0);
  const lo = Math.round((stay * 0.8 + trans) / 100) * 100;
  const hi = Math.round((stay * 1.25 + trans * 1.15) / 100) * 100;
  return { daySum, lo, hi, km: legs.reduce((s, l) => s + l.km, 0) };
}

function renderTrip() {
  const listEl = document.getElementById("stopList");
  const stops = tripStops();
  if (!stops.length) {
    listEl.innerHTML = `<p style="color:var(--ink-soft);text-align:center;padding:20px 0">行程还是空的，去卡片上点「🧳 行程」加几站吧</p>`;
    document.getElementById("tripStats").innerHTML = "";
    document.getElementById("tripSugg").innerHTML = "";
    return;
  }
  const legs = tripLegs();
  let html = `<div class="leg-line"><span class="dash"></span>🏠 上海出发 · ${legs[0].icon} ${legs[0].mode} ${fmtH(legs[0].hours)}（约${legs[0].km}km）</div>`;
  stops.forEach((d, i) => {
    html += `
    <div class="stop" data-idx="${i}">
      <span class="stop-idx">${i + 1}</span>
      <span class="c-emoji" style="width:36px;height:36px;font-size:18px;--rs:${REGION_COLOR[d.region]};background:${REGION_COLOR[d.region]}">${d.emoji}</span>
      <span class="stop-name">${d.name}<br><span class="sm">${d.province} · ${d.crowd}</span></span>
      <select data-days="${i}" title="这一站玩几天">
        ${[...new Set([...d.days, d.chosenDays])].sort((a, b) => a - b).map(n => `<option value="${n}" ${n === d.chosenDays ? "selected" : ""}>${n}天</option>`).join("")}
      </select>
      <button class="mini" data-up="${i}" title="上移">↑</button>
      <button class="mini" data-down="${i}" title="下移">↓</button>
      <button class="mini" data-del="${i}" title="移除">✕</button>
    </div>`;
    const leg = legs[i + 1];
    html += `<div class="leg-line"><span class="dash"></span>${leg.icon} ${leg.mode} ${fmtH(leg.hours)}（约${leg.km}km）${i === stops.length - 1 ? " · 返回上海 🏠" : ""}</div>`;
  });
  listEl.innerHTML = html;

  const b = tripBudget();
  document.getElementById("tripStats").innerHTML = `
    <span>🗓 全程 <b>${b.daySum} 天</b>（不含赶路损耗）</span>
    <span>📏 总里程 <b>约 ${b.km} km</b></span>
    <span>💰 人均预算 <b>¥${b.lo.toLocaleString()} ~ ${b.hi.toLocaleString()}</b></span>`;

  // 顺路彩蛋：距最后一站 500km 内的未加入目的地
  const last = stops[stops.length - 1];
  const near = DATA
    .filter(d => !state.trip.some(t => t.id === d.id))
    .map(d => ({ d, km: hav(last.coords, d.coords) }))
    .filter(x => x.km < 500)
    .sort((a, b2) => a.km - b2.km).slice(0, 3);
  document.getElementById("tripSugg").innerHTML = near.length
    ? `💡 顺路彩蛋（离「${last.name}」不远）：` + near.map(x =>
      `<button class="chip" data-addtrip="${x.d.id}" style="margin-left:6px">${x.d.emoji} ${x.d.name} · ${x.km}km ＋</button>`).join("")
    : "";
}

/* ================= 路书 ================= */
function pickPlan(d, days) {
  let best = d.plans[0];
  d.plans.forEach(p => {
    if (p.days === days) best = p;
    else if (p.days < days && p.days > best.days && best.days !== days) best = p;
  });
  const exact = d.plans.find(p => p.days === days);
  return exact || best;
}

function roadbookModel() {
  const stops = tripStops();
  const legs = tripLegs();
  let day = 0;
  const items = stops.map((d, i) => {
    const start = day + 1, end = day + d.chosenDays;
    day = end;
    return { d, start, end, plan: pickPlan(d, d.chosenDays), legIn: legs[i], legOut: i === stops.length - 1 ? legs[i + 1] : null };
  });
  return { stops, legs, items, budget: tripBudget() };
}

function copyText(txt) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(txt).then(() => toast("已复制，去粘贴吧 📋"), () => fallbackCopy(txt));
  } else fallbackCopy(txt);
}
function fallbackCopy(txt) {
  const ta = document.createElement("textarea");
  ta.value = txt; document.body.appendChild(ta); ta.select();
  try { document.execCommand("copy"); toast("已复制 📋"); } catch (e) { toast("复制失败，请手动选择文本"); }
  ta.remove();
}

/* ================= 彩带 ================= */
function confetti() {
  if (matchMedia("(prefers-reduced-motion: reduce)").matches) return;
  const cv = document.getElementById("confettiCanvas");
  const ctx = cv.getContext("2d");
  cv.width = innerWidth; cv.height = innerHeight; cv.style.display = "block";
  const colors = ["#ff9c3f", "#58b7f0", "#7bc86c", "#f79ec4", "#ffd95c", "#b39deb"];
  const ps = Array.from({ length: 120 }, () => ({
    x: innerWidth / 2 + (Math.random() - 0.5) * 260,
    y: innerHeight * 0.3,
    vx: (Math.random() - 0.5) * 11, vy: -Math.random() * 11 - 3,
    s: Math.random() * 8 + 4,
    c: colors[Math.floor(Math.random() * colors.length)],
    r: Math.random() * Math.PI, vr: (Math.random() - 0.5) * 0.3,
  }));
  let frames = 0;
  (function tick() {
    ctx.clearRect(0, 0, cv.width, cv.height);
    ps.forEach(p => {
      p.x += p.vx; p.y += p.vy; p.vy += 0.32; p.r += p.vr;
      ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.r);
      ctx.fillStyle = p.c; ctx.fillRect(-p.s / 2, -p.s / 2, p.s, p.s * 0.62);
      ctx.restore();
    });
    if (++frames < 110) requestAnimationFrame(tick);
    else cv.style.display = "none";
  })();
}

/* ================= 事件 ================= */
document.addEventListener("click", e => {
  const fav = e.target.closest("[data-fav]");
  if (fav) { e.stopPropagation(); toggleFav(fav.dataset.fav); return; }
  const cmp = e.target.closest("[data-cmp]");
  if (cmp) { e.stopPropagation(); toggleCmp(cmp.dataset.cmp); if (cmp.closest("#detailBody")) openDetail(cmp.dataset.cmp); return; }
  const trip = e.target.closest("[data-trip]");
  if (trip) { e.stopPropagation(); toggleTrip(trip.dataset.trip); if (trip.closest("#detailBody")) openDetail(trip.dataset.trip); return; }
  const addTrip = e.target.closest("[data-addtrip]");
  if (addTrip) { toggleTrip(addTrip.dataset.addtrip); renderTrip(); return; }
  const addRoute = e.target.closest("[data-addroute]");
  if (addRoute) { e.stopPropagation(); addRouteToTrip(addRoute.dataset.addroute); return; }
  const rmCmp = e.target.closest("[data-rmcmp]");
  if (rmCmp) { toggleCmp(rmCmp.dataset.rmcmp); return; }
  const rmTrip = e.target.closest("[data-rmtrip]");
  if (rmTrip) { toggleTrip(rmTrip.dataset.rmtrip); return; }
  const up = e.target.closest("[data-up]");
  if (up) { const i = +up.dataset.up; if (i > 0) { [state.trip[i - 1], state.trip[i]] = [state.trip[i], state.trip[i - 1]]; saveLS(); renderTrip(); } return; }
  const down = e.target.closest("[data-down]");
  if (down) { const i = +down.dataset.down; if (i < state.trip.length - 1) { [state.trip[i + 1], state.trip[i]] = [state.trip[i], state.trip[i + 1]]; saveLS(); renderTrip(); } return; }
  const del = e.target.closest("[data-del]");
  if (del) { state.trip.splice(+del.dataset.del, 1); saveLS(); renderTrip(); render(); return; }
  if (e.target.id === "copyRbBtn") { copyText(roadbookText()); return; }
  if (e.target.id === "printRbBtn") { window.print(); return; }
  const vis = e.target.closest("[data-visited]");
  if (vis) { e.stopPropagation(); toggleVisited(vis.dataset.visited); if (vis.closest("#detailBody")) openDetail(vis.dataset.visited); return; }
  const card = e.target.closest(".card");
  if (card && !e.target.closest(".act")) openDetail(card.dataset.id);
});
document.addEventListener("change", e => {
  const sel = e.target.closest("[data-days]");
  if (sel) { state.trip[+sel.dataset.days].days = +sel.value; saveLS(); renderTrip(); }
});

document.getElementById("cmpGo").addEventListener("click", openCompare);
document.getElementById("tripGo").addEventListener("click", openTrip);
document.getElementById("cmpClear").addEventListener("click", () => { state.cmp = []; saveLS(); render(); toast("对比已清空"); });
document.getElementById("tripClear").addEventListener("click", () => { state.trip = []; saveLS(); render(); toast("行程已清空"); });
document.getElementById("fabGacha").addEventListener("click", openGacha);
document.getElementById("gKnob").addEventListener("click", roll);
document.getElementById("empty").addEventListener("click", e => {
  const b = e.target.closest("[data-relax]");
  if (b) applyRelax(+b.dataset.relax);
});
document.getElementById("gRelaxBtn").addEventListener("click", () => { applyRelax(0); openGacha(); });
document.getElementById("gDetailBtn").addEventListener("click", () => lastPick && openDetail(lastPick.id));
document.getElementById("gTripBtn").addEventListener("click", () => {
  if (!lastPick) return;
  if (lastPick.stops) { addRouteToTrip(lastPick.id); return; } // 线路卡：整条展开装入
  if (!state.trip.some(t => t.id === lastPick.id)) toggleTrip(lastPick.id); else toast("已经在行程里啦");
});
document.getElementById("autoOrderBtn").addEventListener("click", autoOrder);
document.getElementById("clearTripBtn").addEventListener("click", () => { state.trip = []; saveLS(); renderTrip(); render(); });
document.getElementById("makeRoadbookBtn").addEventListener("click", openRoadbook);
document.querySelectorAll(".overlay").forEach(ov => {
  ov.addEventListener("click", e => {
    if (e.target === ov || e.target.closest("[data-close]")) ov.classList.remove("show");
  });
});
addEventListener("keydown", e => {
  if (e.key === "Escape") document.querySelectorAll(".overlay.show").forEach(o => o.classList.remove("show"));
});

/* ================= 启动 ================= */
function boot() {
  loadLS();
  document.getElementById("countPill").textContent = `🗺 ${DATA.filter(d => !d.stops).length} 个目的地 · ${DATA.filter(d => d.stops).length} 条线路 · 现在是${CUR_SEASON}天`;
  buildConsole();
  render();
}
boot();
</script>
