# M66：皮肤视觉回归快照——可选 job（design M66「快照套件不进 verify 主链...独立脚本 + CI 可选
# job」），不是合并门禁。跑在 macos-latest 而非 ubuntu：基线在本机（macOS/arm64）拍摄，字体渲染/
# 抗锯齿与 Linux 差异明显，同源操作系统能大幅降低「环境噪声报红」，但不保证零差异（见
# tests/visual/README.md「基线的环境依赖」）。手动触发或 main 推送后跑，红了是提醒去核实——
# 是真回归还是环境噪声——不自动拦截任何 PR。
name: visual

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  visual:
    runs-on: macos-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: npx playwright install chromium
      - run: bun run test:visual
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: test-results/
          retention-days: 14
